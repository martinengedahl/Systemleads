<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Systemfag Leads — Logg inn</title>
<style>
/* System font stack — skarp, rask, full norsk støtte (æøå) */
:root {
  --sans: -apple-system, 'Segoe UI', system-ui, BlinkMacSystemFont, sans-serif;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace;
}
</style>
<style>

:root {
  --bg:      #f5f2ee;
  --bg2:     #ede8e0;
  --bg3:     #e4ddd2;
  --white:   #ffffff;
  --header:  #1a120a;
  --border:  #e4dbd0;
  --border2: #d4c8b8;
  --accent:  #e8512a;
  --accent2: #c8400e;
  --accentbg:#faeae0;
  --accentb2:rgba(232,81,42,.18);
  --green:   #1a8a3c;
  --greenbg: #eaf5ec;
  --greenb:  rgba(26,138,60,.2);
  --blue:    #1a5fa0;
  --bluebg:  #e8f0fa;
  --blueb:   rgba(26,95,160,.2);
  --warn:    #8a5800;
  --warnbg:  #fdf3dc;
  --warnb:   rgba(138,88,0,.2);
  --red:     #a02020;
  --redbg:   #faeaea;
  --redb:    rgba(160,32,32,.2);
  --text:    #1a120a;
  --text2:   #7a6858;
  --text3:   #a89878;
  --mono:    var(--mono);
  --sans:    var(--sans);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* ── TOPBAR ── */
.topbar {
  height: 46px;
  background: var(--header);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
.logo-mark { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
.logo-sq { width: 6px; height: 6px; border-radius: 1.5px; background: var(--accent); }
.logo-name { font-size: 12px; font-weight: 700; color: #fff; letter-spacing: -.01em; }
.logo-name b { color: var(--accent); font-weight: 700; }
.topbar-sep { width: 1px; height: 14px; background: rgba(255,255,255,.1); }
.topbar-live { display: flex; align-items: center; gap: 4px; font-size: 10px; color: rgba(255,255,255,.35); font-family: var(--mono); }
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: #4ade80; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

/* ── NAV ── */
.nav { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); padding: 0 20px; }
.nav-btn { font-size: 11px; font-weight: 500; color: var(--text3); padding: 0 14px; height: 40px; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .12s; white-space: nowrap; }
.nav-btn:hover { color: var(--text); }
.nav-btn.act { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }

/* ── BUTTONS ── */
.btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; font-family: var(--sans); font-size: 12px; font-weight: 600; padding: .45rem 1rem; cursor: pointer; transition: all .12s; white-space: nowrap; display: inline-flex; align-items: center; gap: .35rem; }
.btn:hover { background: var(--accent2); }
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .35; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); border-radius: 6px; font-family: var(--sans); font-size: 11px; font-weight: 500; padding: .38rem .85rem; cursor: pointer; transition: all .12s; white-space: nowrap; }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: var(--accentbg); }
.btn-danger { background: transparent; color: var(--red); border: 1px solid var(--redb); border-radius: 5px; font-family: var(--mono); font-size: 11px; padding: .22rem .5rem; cursor: pointer; transition: all .12s; }
.btn-danger:hover { background: var(--redbg); }

/* ── INPUTS ── */
.inp { width: 100%; background: var(--white); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-family: var(--sans); font-size: 13px; padding: .5rem .8rem; outline: none; transition: border-color .12s, box-shadow .12s; }
.inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,81,42,.1); }
.inp::placeholder { color: var(--text3); }
select.inp option { background: var(--white); }
.lbl { display: block; font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text2); margin-bottom: .35rem; }

/* ── CARDS ── */
.card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 1.1rem 1.25rem; }
.card-accent { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 1.1rem 1.25rem; border-left: 3px solid var(--accent); }

/* ── STAT CARDS ── */
.stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.2rem; }
.stat-n { font-size: 28px; font-weight: 800; line-height: 1; letter-spacing: -.03em; }
.stat-l { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .09em; color: var(--text2); margin-top: .35rem; }

/* ── TAGS ── */
.tag { font-family: var(--mono); font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
.tag-accent { background: var(--accentbg); color: #7a2808; border: 1px solid var(--accentb2); }
.tag-green  { background: var(--greenbg); color: var(--green); border: 1px solid var(--greenb); }
.tag-blue   { background: var(--bluebg);  color: var(--blue);  border: 1px solid var(--blueb); }
.tag-warn   { background: var(--warnbg);  color: var(--warn);  border: 1px solid var(--warnb); }
.tag-red    { background: var(--redbg);   color: var(--red);   border: 1px solid var(--redb); }
.tag-muted  { background: var(--bg2);     color: var(--text2); border: 1px solid var(--border); }

/* ── LEAD CARD ── */
.lead-card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; display: grid; grid-template-columns: 1fr 210px; gap: 1.25rem; align-items: start; margin-bottom: 7px; transition: border-color .12s; padding: 0 1.25rem; height: 56px; align-items: center; overflow: hidden; }
.lead-card.expanded { height: auto; padding: 1rem 1.25rem; align-items: start; }
.lead-card:hover { border-color: var(--border2); }
.lead-card.s-ny     { border-left: 3px solid var(--accent); }
.lead-card.s-ringt  { border-left: 3px solid var(--warn); }
.lead-card.s-tilbud { border-left: 3px solid var(--blue); }
.lead-card.s-ferdig { border-left: 3px solid var(--green); }
.lead-name { font-size: 12.5px; font-weight: 600; color: var(--text); }
.lead-meta { font-family: var(--mono); font-size: 10px; color: var(--text2); display: flex; gap: .6rem; flex-wrap: wrap; margin-top: 2px; }

/* ── SCORE ── */
.score-wrap { display: flex; align-items: center; gap: 5px; }
.score-n { font-size: 14px; font-weight: 800; min-width: 26px; letter-spacing: -.02em; }
.score-bar { flex: 1; height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; min-width: 30px; }
.score-fill { height: 100%; border-radius: 2px; }

/* ── MODAL ── */
.modal-bg { position: fixed; inset: 0; z-index: 9000; background: rgba(26,18,10,.5); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
.modal-bg.hidden { display: none; }
.modal { background: var(--white); border: 1px solid var(--border2); border-radius: 12px; padding: 1.75rem; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(26,18,10,.2); }
.modal-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
.modal-close { background: transparent; border: none; color: var(--text2); font-size: 16px; cursor: pointer; padding: .2rem .4rem; border-radius: 4px; }
.modal-close:hover { background: var(--bg2); }

/* ── SECTION ── */
.sec { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: var(--text2); margin: 1.25rem 0 .75rem; display: flex; align-items: center; gap: .5rem; }
.sec::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.sec:first-child { margin-top: 0; }

/* ── TABLE ── */
.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); padding: .6rem .85rem; text-align: left; border-bottom: 1px solid var(--border); }
.tbl td { padding: .65rem .85rem; border-bottom: 1px solid var(--bg2); vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--bg); }

/* ── PHASE STRIP ── */
.phase-strip { display: grid; grid-template-columns: repeat(3,1fr); border-bottom: 1px solid var(--border); background: var(--bg2); }
.phase-block { padding: 12px 18px; border-right: 1px solid var(--border); }
.phase-block:last-child { border-right: none; }
.phase-block.active { background: #fff8f4; }
.phase-label { font-family: var(--mono); font-size: 8.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); margin-bottom: 2px; }
.phase-title { font-size: 11.5px; font-weight: 600; color: var(--text); }
.phase-count { font-size: 22px; font-weight: 800; letter-spacing: -.03em; margin: 3px 0; }
.phase-btn { font-size: 10px; font-weight: 600; padding: 4px 9px; border-radius: 4px; border: none; cursor: pointer; }
.phase-btn.done { background: var(--greenbg); color: var(--green); }
.phase-btn.go   { background: var(--accent); color: #fff; }

/* ── SIDEBAR ── */
.sidebar { border-right: 1px solid var(--border); padding: 14px 11px; background: var(--bg2); min-height: calc(100vh - 46px); }
.sidebar-label { font-family: var(--mono); font-size: 8.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--text3); margin-bottom: 8px; margin-top: 12px; display: block; }
.sidebar-label:first-child { margin-top: 0; }
.kurs-item { display: flex; align-items: center; gap: 7px; padding: 5px 7px; border-radius: 4px; cursor: pointer; margin-bottom: 1px; user-select: none; }
.kurs-item:hover { background: rgba(232,81,42,.05); }
.kurs-item.on { background: rgba(232,81,42,.08); }
.kurs-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--bg3); flex-shrink: 0; transition: background .12s; }
.kurs-item.on .kurs-dot { background: var(--accent); }
.kurs-name { font-size: 11px; color: var(--text2); }
.kurs-item.on .kurs-name { color: var(--text); font-weight: 500; }

/* ── SPINNER ── */
.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ── */
#toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--header); color: #fff; border-radius: 8px; padding: .6rem 1rem; font-size: 12px; opacity: 0; transform: translateY(6px); transition: all .2s; pointer-events: none; z-index: 9999; max-width: 280px; }
#toast.show { opacity: 1; transform: none; }
#toast.err { background: #6a1010; }

/* ── FADE ── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.fade { animation: fadeUp .25s ease both; }

/* ── STATUS BAR ── */
.status-bar { display: flex; align-items: center; gap: .6rem; padding: .55rem .9rem; background: var(--white); border: 1px solid var(--border); border-radius: 7px; font-family: var(--mono); font-size: 11px; margin-bottom: .65rem; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.status-dot.idle { background: var(--bg3); }
.status-dot.run  { background: var(--accent); animation: pulse .8s infinite; }
.status-dot.ok   { background: var(--green); }
.status-dot.err  { background: var(--red); }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .lead-card { grid-template-columns: 1fr; height: auto; padding: 1rem 1.25rem; }
  .stats-grid { grid-template-columns: repeat(2,1fr) !important; }
}

body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
.login-wrap { width:380px; }
.login-card { background:var(--white); border:1px solid var(--border2); border-radius:12px; padding:2.25rem; box-shadow:0 8px 32px rgba(26,18,10,.1); animation:fadeUp .3s ease; }
.login-logo { display:flex; align-items:center; gap:10px; margin-bottom:2rem; }
.login-brand { font-size:14px; font-weight:700; color:var(--text); }
.login-brand b { color:var(--accent); }
.login-tagline { font-family:var(--mono); font-size:9px; text-transform:uppercase; letter-spacing:.1em; color:var(--text3); margin-top:2px; }
.login-title { font-size:20px; font-weight:800; letter-spacing:-.03em; margin-bottom:.35rem; }
.login-desc { font-size:12px; color:var(--text2); margin-bottom:1.75rem; line-height:1.5; }
.role-toggle { display:flex; background:var(--bg2); border:1px solid var(--border); border-radius:7px; padding:3px; gap:3px; margin-bottom:1.5rem; }
.role-btn { flex:1; padding:.55rem .5rem; border-radius:5px; border:none; background:transparent; color:var(--text2); font-size:12px; font-weight:500; cursor:pointer; transition:all .12s; display:flex; align-items:center; justify-content:center; gap:.4rem; font-family:var(--sans); }
.role-btn:hover { color:var(--text); }
.role-btn.act { background:var(--white); color:var(--text); font-weight:600; box-shadow:0 1px 4px rgba(26,18,10,.1); }
.role-btn.act .rb-dot { background:var(--accent); }
.rb-dot { width:5px; height:5px; border-radius:50%; background:var(--bg3); transition:background .12s; }
.field { margin-bottom:.9rem; }
.login-btn { width:100%; background:var(--accent); color:#fff; border:none; border-radius:7px; font-size:13px; font-weight:700; padding:.7rem; cursor:pointer; transition:all .15s; margin-top:.25rem; display:flex; align-items:center; justify-content:center; gap:.5rem; font-family:var(--sans); }
.login-btn:hover { background:var(--accent2); }
.login-btn:disabled { opacity:.45; cursor:not-allowed; }
.login-err { color:var(--red); font-family:var(--mono); font-size:11px; text-align:center; margin-top:.6rem; display:none; }
.login-err.show { display:block; }
.login-divider { height:1px; background:var(--border); margin:1.5rem 0; }
.login-stats { display:flex; justify-content:space-between; }
.ls-item { text-align:center; }
.ls-n { font-size:18px; font-weight:800; color:var(--text); letter-spacing:-.03em; }
.ls-l { font-family:var(--mono); font-size:8px; text-transform:uppercase; letter-spacing:.09em; color:var(--text3); margin-top:2px; }
.ls-sep { width:1px; background:var(--border); }

.site-footer{border-top:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);position:fixed;bottom:0;left:0;right:0;}
.footer-copy{font-family:var(--mono);font-size:9.5px;color:var(--text3);}
.footer-dev{font-family:var(--mono);font-size:9.5px;color:var(--text3);}
.footer-dev span{color:var(--text2);}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">
  <div class="logo-sq"></div><div class="logo-sq" style="opacity:.4"></div>
  <div class="logo-sq" style="opacity:.4"></div><div class="logo-sq" style="opacity:.15"></div>
</div>
      <div>
        <div class="login-brand">Systemfag <b>Leads</b></div>
        <div class="login-tagline">Internt salgsverktøy</div>
      </div>
    </div>
    <div class="login-title">Velkommen tilbake</div>
    <div class="login-desc">Velg din rolle og logg inn for å fortsette.</div>
    <div class="role-toggle" id="roleToggle">
      <button class="role-btn act" data-role="admin" onclick="velgRolle('admin',this)">
        <span class="rb-dot"></span> Admin / Prospektør
      </button>
      <button class="role-btn" data-role="selger" onclick="velgRolle('selger',this)">
        <span class="rb-dot"></span> Selger
      </button>
    </div>
    <div id="adminFields">
      <div class="field"><label class="lbl">Passord</label><input class="inp" type="password" id="adminPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    </div>
    <div id="selgerFields" style="display:none;">
      <div class="field"><label class="lbl">Brukernavn</label><input class="inp" type="text" id="selgerUser" placeholder="fornavn.etternavn" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <div class="field"><label class="lbl">Passord</label><input class="inp" type="password" id="selgerPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      <span id="loginBtnTxt">Logg inn</span>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7h9M8 3.5l3.5 3.5L8 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="login-err" id="loginErr">Feil brukernavn eller passord.</div>
    <div class="login-divider"></div>
    <div class="login-stats">
      <div class="ls-item"><div class="ls-n">28</div><div class="ls-l">Kurs</div></div>
      <div class="ls-sep"></div>
      <div class="ls-item"><div class="ls-n">84</div><div class="ls-l">NACE-koder</div></div>
      <div class="ls-sep"></div>
      <div class="ls-item"><div class="ls-n">3</div><div class="ls-l">Faser</div></div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>

const SB_URL='https://oijyvobmacigkbsugvvm.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9panl2b2JtYWNpZ2tic3VndnZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2ODcxOTEsImV4cCI6MjA4OTI2MzE5MX0.Zg17wUXRwSjqUKndxw0gNrmAJLawglz-oMNSuLflt-s';
const SB_HDR={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
async function sb(method,table,body,params=''){
  const r=await fetch(SB_URL+'/rest/v1/'+table+params,{method,headers:SB_HDR,body:body?JSON.stringify(body):undefined});
  if(!r.ok)throw new Error(r.status+' '+await r.text());
  return r.status===204?null:r.json();
}
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return[...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function fmtKr(n){return new Intl.NumberFormat('no-NO',{style:'currency',currency:'NOK',maximumFractionDigits:0}).format(n||0);}
function fmtD(d){if(!d)return'–';return new Date(d).toLocaleDateString('no-NO',{day:'2-digit',month:'short',year:'numeric'});}
function toast(msg,err=false){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}
  t.textContent=msg; t.className='show'+(err?' err':'');
  clearTimeout(t._t); t._t=setTimeout(()=>t.className='',3000);
}

const ADMIN_HASH='44b985d55f5f696cf3c96f058dd48bf2f72808d527fc9251ad679ba77b9d25dd', APP_HASH='44b985d55f5f696cf3c96f058dd48bf2f72808d527fc9251ad679ba77b9d25dd';
let currentRole='admin';
function velgRolle(r,btn){
  currentRole=r;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
  document.getElementById('adminFields').style.display=r==='admin'?'block':'none';
  document.getElementById('selgerFields').style.display=r==='selger'?'block':'none';
  setTimeout(()=>{const f=r==='admin'?document.getElementById('adminPass'):document.getElementById('selgerUser');if(f)f.focus();},50);
}
async function doLogin(){
  const btn=document.getElementById('loginBtn'),txt=document.getElementById('loginBtnTxt'),err=document.getElementById('loginErr');
  err.classList.remove('show'); btn.disabled=true; txt.textContent='Logger inn…';
  try{
    if(currentRole==='admin'){
      const p=document.getElementById('adminPass').value;
      if(!p)throw new Error('Skriv inn passord');
      const h=await sha256(p);
      if(h===APP_HASH||h===ADMIN_HASH){
        sessionStorage.setItem('sf_auth','1');
        if(h===ADMIN_HASH)sessionStorage.setItem('sf_admin','1');
        window.location.href='systemfag-prospektering.html';
      }else throw new Error('Feil passord');
    }else{
      const u=(document.getElementById('selgerUser').value||'').trim().toLowerCase();
      const p=document.getElementById('selgerPass').value;
      if(!u||!p)throw new Error('Fyll inn begge felt');
      const hash=await sha256(p);
      const data=await sb('GET','selgere',null,'?brukernavn=eq.'+encodeURIComponent(u)+'&passord_hash=eq.'+encodeURIComponent(hash)+'&select=brukernavn,navn');
      if(!data||!data.length)throw new Error('Feil brukernavn eller passord');
      sessionStorage.setItem('sf_selger',JSON.stringify(data[0]));
      window.location.href='selger-portal.html';
    }
  }catch(e){
    err.textContent=e.message; err.classList.add('show');
    if(currentRole==='admin')document.getElementById('adminPass').value='';
    else document.getElementById('selgerPass').value='';
  }finally{btn.disabled=false;txt.textContent='Logg inn';}
}
(function(){
  if(sessionStorage.getItem('sf_selger')){window.location.href='selger-portal.html';return;}
  if(sessionStorage.getItem('sf_auth')){window.location.href='systemfag-prospektering.html';return;}
  setTimeout(()=>document.getElementById('adminPass').focus(),100);
})();
</script>
